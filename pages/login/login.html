<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Tiendita</title>
    <link rel="stylesheet" href="../../styles/styles.css">
</head>
<body>

<header class="header">
    <h1 class="logo">Tiendita</h1>
    <nav>
        <ul class="nav-links">
            <li><a href="../../pages/Home/index.html">Inicio</a></li>
            <li>
                 <a href="../../pages/Cart/carrito.html" class="carrito-link">
                     <span class="icono-carrito">🛒</span>
                     <span>Carrito</span>
                 </a>
            </li>
        </ul>
    </nav>
</header>

<section class="login-container">
    <div class="login-box">
        <h2>Iniciar sesión</h2>
        <form id="login-form">
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required placeholder="********">
            </div>
            <button type="submit" class="btn-login">Ingresar</button>
        </form>
    </div>
</section>

<footer class="footer">
    <p>© 2026 Tiendita - La mejor página web para Mercar</p>
</footer>

<script type="module" src="../../index.js"></script>
</body>
</html>
